erpc_url = ERPC://10.43.0.2:3000
pinning_script = /root/pin_rockpi_supervised.sh

[controller]
ssh = root@10.42.0.211
ssh_jump = root@10.42.0.211
label = VisionFive
board = starfive
iface = end0
connection = end0-static
addr = 10.43.0.1/24
pc_route = 10.42.0.0/24
pc_gateway = 10.42.0.211
uart = /dev/ttyUSB0
uart_baud = 1500000
rt_supervisor_dir = /root/rt-supervisor
controller_bin = /root/rt-supervisor/Build/src/controller-emu
pinning_script = /root/pin_visionfive_controller.sh

[measurement]
