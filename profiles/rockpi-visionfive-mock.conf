[pc]
rt_tester_dir = /home/taranev/work_repos/rt/rt-tester
rt_supervisor_dir = /home/taranev/work_repos/rt/rt-supervisor
arduino_port = /dev/ttyACM0
ethernet_iface = enp2s0
ethernet_connection = Проводное подключение 1
ethernet_addr = 10.42.0.1/24
controller_route = 10.43.0.0/24
